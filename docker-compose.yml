# CCMS production stack.
#
# Custom images are pulled from GitHub Container Registry (ghcr.io):
#   - ghcr.io/askamoghb-rgb/ccms-server
#   - ghcr.io/askamoghb-rgb/ccms-ui
#   - ghcr.io/askamoghb-rgb/ccms-nginx
#   - ghcr.io/askamoghb-rgb/ccms-seed
# These are built and published by .github/workflows/build-images.yml
# on every push to main.
#
# To pin to a specific version instead of :latest, replace the tag
# with a short commit SHA (visible in the Actions run output).
# To force re-pulling, run `docker compose pull` before `docker compose up -d`.
#
# Environment variables are injected by Hostinger's Environment section.
# No .env file is used on the server.

services:
  mongodb:
    image: mongo:3.4
    container_name: cspl-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  mysql:
    image: mysql:5.7
    container_name: cspl-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-employee_db}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/seeds/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  seed:
    image: ghcr.io/askamoghb-rgb/ccms-seed:latest
    container_name: cspl-seed
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./db/seeds:/seeds:ro
    environment:
      MONGO_HOST: ${MONGODB_HOST:-mongodb}
      MONGO_PORT: ${MONGODB_PORT:-27017}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-employee_db}
      SEED_DATA: ${SEED_DATA:-true}
      USERS_JSON: ${USERS_JSON:-[]}
    restart: "no"

  server:
    image: ghcr.io/askamoghb-rgb/ccms-server:latest
    container_name: cspl-server
    ports:
      - "${SERVER_PORT:-8102}:${SERVER_PORT:-8102}"
      - "${NETTY_PORT:-9100}:${NETTY_PORT:-9100}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8102}
      SERVER_CONTEXT_PATH: ${SERVER_CONTEXT_PATH:-/user}
      NETTY_PORT: ${NETTY_PORT:-9100}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE:-ccms}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME:-}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD:-}
      SERVER_LOG_DIR: ${SERVER_LOG_DIR:-/home/CCMS/roadmap/logs}
    depends_on:
      mongodb:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${SERVER_PORT:-8102}/user/push/hafe_open_connections"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ccms_ui:
    image: ghcr.io/askamoghb-rgb/ccms-ui:latest
    container_name: cspl-ccms-ui
    ports: []
    volumes:
      - ./data/dontdelete:/home/data/dontdelete
    environment:
      CCMS_SERVER_HOST: ${CCMS_SERVER_HOST:-server}
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-ccms}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-employee_db}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SERVER_PORT: ${SERVER_PORT:-8102}
      BACKEND_HTTP_PORT: ${BACKEND_HTTP_PORT:-8102}
      BACKEND_HTTP_CONTEXT: ${BACKEND_HTTP_CONTEXT:-/user}
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
      server:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/CCMS/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
    image: ghcr.io/askamoghb-rgb/ccms-nginx:latest
    container_name: cspl-nginx
    ports:
      - "80:80"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-ccms.example.com}
    depends_on:
      ccms_ui:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mongodb_data:
  mysql_data:
