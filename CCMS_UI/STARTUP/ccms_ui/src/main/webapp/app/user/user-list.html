
<section id="brand" class="row">

	<div class="col-md-12">
		<br>
			
			<div class="col-md-6">

				<!-- <div loading-indicator class="waiting-box">
					<span><img
						src="images/waiting.gif" /></span>
				</div> -->
			</div>
</div>

	<div class="col-md-12">
	<div class="col-md-4">
				<h3 class=heading>&nbsp;&nbsp;&nbsp;
					USER INFORMATION</h3>
			</div>
			<div class="col-md-4"></div>
		<div class="col-md-2" align="right" 	><br>
				<a type="button" ng-click="add()" class="btn btn-info btn-sm">Add New User</a>
		</div>
		<div class="col-md-2" align="right" style="padding-top: 5px">
						<div class="input-group add-on" style="padding: 10px">
							<input class="form-control" ng-model="searchFish" />
							<div class="input-group-btn">
								<button class="btn btn-default" type="submit">
									<i class="fa fa-search"></i>
								</button>
							</div>

						</div>

					</div>
				</div>
		
		<div class="col-md-12">
			<div class="card">

				<table class="table table-bordered">

					<thead>
						<tr class =table_head>
							<td align="center"><a>SI NO</a></td>
							
							<td align="center"><a
								ng-click="sortType = 'firstName'; sortReverse = !sortReverse">
									First Name <span ng-show="sortType == 'firstName' && !sortReverse"
									class="fa fa-caret-down"></span> <span
									ng-show="sortType == 'firstName' && sortReverse"
									class="fa fa-caret-up"></span>
							</a></td>
							
							<td align="center"><a
								ng-click="sortType = 'lastName'; sortReverse = !sortReverse">
								Last Name <span ng-show="sortType == 'lastName' && !sortReverse"
									class="fa fa-caret-down"></span> <span
									ng-show="sortType == 'lastName' && sortReverse"
									class="fa fa-caret-up"></span>
							</a></td>
							
							<td align="center"><a
								ng-click="sortType = 'email'; sortReverse = !sortReverse">
									Email <span ng-show="sortType == 'email' && !sortReverse"
									class="fa fa-caret-down"></span> <span
									ng-show="sortType == ' email' && sortReverse"
									class="fa fa-caret-up"></span>
							</a></td>

							<td align="center"><a
								ng-click="sortType = 'mobnum1'; sortReverse = !sortReverse">
									Mobile Number <span
									ng-show="sortType == 'mobnum1' && !sortReverse"
									class="fa fa-caret-down"></span> <span
									ng-show="sortType == 'mobnum1' && sortReverse"
									class="fa fa-caret-up"></span>
							</a></td>

							
							<td align="center"><a
								ng-click="sortType = 'role'; sortReverse = !sortReverse">
								  Role <span ng-show="sortType == 'role' && !sortReverse"
									class="fa fa-caret-down"></span> <span
									ng-show="sortType == 'role' && sortReverse"
									class="fa fa-caret-up"></span>
							</a></td>

							<td align="center"><a>ACTION</a></td>

						</tr>
					</thead>

					<tbody>
						<tr
							ng-repeat="obj in listData | orderBy:sortType:sortReverse | filter:searchFish">
							<td align="center">{{ $index + 1 }}</td>  
							<td align="center">{{ obj.firstName }}</td>
							<td align="center">{{ obj.lastName }}</td>
							<td align="center">{{ obj.email }}</td>
							<td align="center">{{ obj.mobnum1 }}</td>
							<td align="center" ><span class="label label-info">{{ obj.role }}</span></td>
							
							
							<td align="center"><md-icon class="material-icons"
									ng-click="update(obj);"
									style="color:#607D8B;font-size: 20px; height: 20px">edit</md-icon>
								<md-icon class="material-icons" ng-click="deleteconf(obj.firstname);"
									style="color:#F44336;font-size: 20px; height: 20px">delete</md-icon>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
	</div>
	
	<div class="col-md-12" align="center">
			<pagination boundary-links="true" max-size="3"
				items-per-page="itemsPerPage" total-items="todos.length"
				ng-model="currentPage" ng-change="pageChanged()"></pagination>
		</div>
</section>
