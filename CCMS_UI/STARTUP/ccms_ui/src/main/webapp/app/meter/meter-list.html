	
<section id="brand" class="row">

	<div class="col-md-12">
			<div class="col-md-4">
				<h3 class=heading >
					METER DETAILS</h3>	</div>
				
				<div class="col-md-2" ></div>
		
			<div class="col-md-2"><br>
 			<div class=pull-right> 
			<a type="button" ng-click="add_meter();" class="btn btn-info btn-sm">Add Meter</a>
			</div> 
			</div>
			
			
			<div class="col-md-2"><br>
			<div class=pull-right>
			<a type="button" ng-click="dcu_list();" class="btn btn-info btn-sm">DCU list</a>
			</div>
			</div>
			
			<div class="col-md-2" align="right">
			
						<div class="input-group add-on" style="padding: 14px">
							<input class="form-control" ng-model="searchFish" />
							<div class="input-group-btn">
								<button class="btn btn-default" type="submit">
									<i class="fa fa-search"></i>
								</button>
							</div>

						</div>		
					
			
			</div>
</div>
		<div class="col-md-12">
			
				<table class="table table-bordered">

					<thead>
						<tr class=table_head>
							

							
							<td align="center"><a>SL NO</a></td>
							
							<td align="center"><a
								ng-click="sortType = 'name'; sortReverse = !sortReverse">
									Name <span ng-show="sortType == 'name' && !sortReverse"
									class="fa fa-caret-down"></span> <span
									ng-show="sortType == 'name' && sortReverse"
									class="fa fa-caret-up"></span>
							</a></td>
							<td align="center"><a
								ng-click="sortType = 'serial_number'; sortReverse = !sortReverse">
									Serial Number <span
									ng-show="sortType == 'serial_number' && !sortReverse"
									class="fa fa-caret-down"></span> <span
									ng-show="sortType == 'serial_number' && sortReverse"
									class="fa fa-caret-up"></span>
							</a></td>
							
							<td align="center"><a
								ng-click="sortType = 'rf_id'; sortReverse = !sortReverse">
									RF Id <span ng-show="sortType == 'rf_id' && !sortReverse"
									class="fa fa-caret-down"></span> <span
									ng-show="sortType == 'rf_id' && sortReverse"
									class="fa fa-caret-up"></span>
							</a></td>
							

							<td align="center"><a>ACTION</a></td>

						</tr>
					</thead>

					<tbody>
						<tr
							ng-repeat="obj in listData | orderBy:sortType:sortReverse | filter:searchFish">
							<td align="center">{{ $index + 1 }}</td> 
							<td align="center">{{ obj.name	}}</td>
							<td align="center">{{ obj.serial_number	}}</td>
							<td align="center">{{ obj.rf_id}}</td>
							
							
							
							<td align="center">
							       <md-icon class="material-icons"
									ng-click="update_meter(obj);" data-toggle="tooltip" title="Update Meter Details"
									style="color:#607D8B;font-size: 20px; height: 20px">edit</md-icon>
								    
								    <md-icon class="material-icons" ng-click="delete_meter(obj.gateway_serial_number);" data-toggle="tooltip" title="Delete Meter "
									style="color:#F44336;font-size: 20px; height: 20px">delete</md-icon>
									
									<md-icon class="material-icons" ng-click="meter_calibration(obj);" data-toggle="tooltip" title="Calibration	"
									style="color:#004d00;font-size: 20px; height: 20px">settings</md-icon>
									
									<md-icon class="material-icons"
									ng-click="associate_tag(obj);" data-toggle="tooltip" title="Associate Tag"
									style="color:#607D8B;font-size: 20px; height: 20px">group_work</md-icon>
								    
								    
							</td>
						</tr>
					</tbody>
				</table>

			</div>
		
		<div class="col-md-12" align="center">
			<pagination boundary-links="true" max-size="3"
				items-per-page="itemsPerPage" total-items="todos.length"
				ng-model="currentPage" ng-change="pageChanged()"></pagination>
		</div>
	</div>
</section>
