<div class="col-sm-12">
	<div class="col-sm-1"></div>
	<div class="col-sm-10">
		<div class="col-sm-12">

			<div class="col-sm-6" align="center">
				<div>
					<div style="color: #c8ea4d; font-size: 25px; height: 10px">Credentials
						details</div>
					<div class="panel-body">

						<br> <br> <br>
						<form class="form-horizontal">
							<div class="form-group">
								<label class="col-md-4 control-label formTextWeight">First
									Name:</label>
								<div class="col-md-8">
									<input type="text"
										class="form-control ng-pristine ng-untouched ng-invalid ng-invalid-required ng-valid-pattern ng-valid-maxlength"
										name="FirstName" id="firstName" placeholder="Enter First name"
										ng-model="user.firstName" ng-change="user.fistName"
										ng-maxlength="50" maxlength="100"
										ng-pattern="/^[a-zA-Z0-9 ._-]+$/" ng-required="true"
										required="required">
								</div>
							</div>

							<div class="form-group">
								<label class="col-md-4 control-label formTextWeight">Last
									Name:</label>
								<div class="col-md-8">
									<input type="text" class="form-control" name="LastName"
										id="LastName" placeholder="Enter Last name"
										ng-model="user.lastName" ng-change="user.lastName"
										ng-maxlength="50" maxlength="100"
										ng-pattern="/^[a-zA-Z0-9 ._-]+$/" ng-required="true"
										required="required">
								</div>
							</div>

							<div class="form-group">
								<label class="col-md-4 control-label formTextWeight">Email:</label>
								<div class="col-md-8">
									<input type="email" class="form-control" name="email"
										id="email" placeholder="Enter Email." ng-model="user.email">
								</div>
							</div>

							<div class="form-group">
								<label class="col-md-4 control-label formTextWeight">Password:</label>
								<div class="col-md-8">
									<input type="password" class="form-control" name="LastName"
										id="LastName" placeholder="Enter Password"
										ng-model="user.password" ng-change="user.last_name"
										required="required">
								</div>
							</div>

							<div class="form-group">
								<label class="col-md-4 control-label">Mobile Number:</label>
								<div class="col-md-8">
									<input type="text" class="form-control" name="mobnum1"
										id="mobnum1" placeholder="Enter Number"
										ng-model="user.mobnum1">
								</div>
							</div>

							<div class="form-group">
								<label class="col-md-4 control-label formTextWeight">Role:</label>
								<div class="col-md-8">
									<select type="text"
										class="form-control ng-pristine ng-untouched ng-invalid ng-invalid-required ng-valid-pattern ng-valid-maxlength"
										name="LastName" id="LastName" placeholder="Role"
										ng-model="user.role" ng-change="user.role" ng-maxlength="50"
										maxlength="100" ng-pattern="/^[a-zA-Z0-9 ._-]+$/"
										ng-required="true" required="required">
										<option>ADMIN</option>
										<option>USER</option>
									</select>
								</div>
							</div>

						</form>
					</div>
				</div>
			</div>



			<form class="form-horizontal">
				<div class="col-sm-6" align="center">
					<div>
						<div style="color: #c8ea4d; font-size: 25px; height: 10px">
							Other Credentials details</div>
						<div class="panel-body">
							<br> <br> <br>


							<div class="form-group">
								<label class="col-md-4 control-label formTextWeight">Address:</label>
								<div class="col-md-8">
									<textarea type="text" class="form-control"
										placeholder="Address" ng-model="user.address"></textarea>
								</div>
							</div>

							<div class="form-group">
								<label class="control-label col-md-4"
									style="font-size: 15px; height: 10px">State:</label>
								<div class="col-md-8">
									<select ng-model="user.state" placeholder="State"
										class="form-control">
										<option>Andra Pradesh</option>
										<option>Arunachal Pradesh</option>
										<option>Assam</option>
										<option>Bihar</option>
										<option>Aandra Pradesh</option>
										<option>Chhattisgarh</option>
										<option>Goa</option>
										<option>Gujarat</option>
										<option>Haryana</option>
										<option>Himachal Pradesh</option>
										<option>Jammu and Kashmir</option>
										<option>Jharkhand</option>
										<option>Karnatka</option>
										<option>Kerala</option>
										<option>Madya Pradesh</option>
										<option>Maharashtra</option>
										<option>Manipur</option>
										<option>Meghalaya</option>
										<option>Mizoram</option>
										<option>Nagaland</option>
										<option>Orissa</option>
										<option>Punjab</option>
										<option>Rajasthan</option>
										<option>Sikkim</option>
										<option>Tamil Nadu</option>
										<option>Telagana</option>
										<option>Tripura</option>
										<option>Uttaranchal</option>
										<option>Uttar Pradesh</option>
										<option>West Bengal</option>
									</select>
								</div>
							</div>
							
								<div class="form-group">
								<label class="col-md-4" style="padding-right: 80px" align="left">District</label>
								<div class="col-md-8">
									<select ng-model="user.dist"
										ng-change="getMandalOnSelect();" class="form-control">
										<option ng-repeat="x in districts" value="{{x.code}}">{{x.state}}</option>
									</select>
								</div>
							</div>

							<div class="form-group">
								<label class="col-md-4" style="padding-right: 80px" align="left">Mondal</label>
								<div class="col-md-8">
									<select ng-model="user.mondal" class="form-control"
										ng-change="getGpOnSelect();">
											<option ng-repeat="x in mandal_list" value="{{x}}">{{x}}</option>
									</select>
								</div>
							</div>

							<div class="form-group">
								<label class="col-md-4" style="padding-right: 80px" align="left">GP</label>
								<div class="col-md-8">
									<select ng-model="user.gp" class="form-control"
										ng-change="getVillageOnSelect();">
										<option ng-repeat="x in gp_list" value="{{x}}">{{x}}</option>
									</select>
								</div>
							</div>
						</div>
					</div>
				</div>
			</form>

		</div>

		<div class="col-sm-12">
			<hr>
		</div>
