
<section id="brand" class="row">

	<div class="col-md-12">

		<div class="col-md-2" align="left">
			<h3 class=heading>&nbsp;&nbsp;&nbsp;
				DCU/RTU</h3>
		</div>
		<div class="col-md-2"></div>
		<div class="col-md-6" align="right" style="padding-top: 20px">
			 <a type="button" ng-click="add();"
				class="btn btn-info btn-sm	">Add DCU/RTU</a>
		
			 <!-- <a type="button" ng-click="add1();"
				class="btn btn-info btn-sm ">IMPORT NODE</a>
		
			<a type="button" ng-click="add2();"
				class="btn btn-info btn-sm "> SUN RISE/SET</a> -->
		</div>
		<div class="col-md-2">
			<div class="input-group add-on" style="padding: 18px">
				<input class="form-control" ng-model="searchFish" />
				<div class="input-group-btn">
					<button class="btn btn-default" ng-click="search();">
						<i class="fa fa-search"></i>
					</button>
				</div>

			</div>

		</div>
	</div>

	<div class="col-md-12">
		<table class="table table-bordered">

			<thead>
				<tr class=table_head>



					<td align="center"><a>SI NO</a></td>

					<td align="center"><a
						ng-click="sortType = 'dcu'; sortReverse = !sortReverse">
							RTU/DCU Name <span ng-show="sortType == 'dcu' && !sortReverse"
							class="fa fa-caret-down"></span> <span
							ng-show="sortType == 'dcu' && sortReverse" class="fa fa-caret-up"></span>
					</a></td>
					

					<td align="center"><a
						ng-click="sortType = 'gateway_identifier'; sortReverse = !sortReverse">
							Serial Number  <span
							ng-show="sortType == 'gateway_identifier' && !sortReverse"
							class="fa fa-caret-down"></span> <span
							ng-show="sortType == 'gateway_identifier' && sortReverse"
							class="fa fa-caret-up"></span>
					</a></td>

<td align="center"><a
						ng-click="sortType = 'hs_time_stamp'; sortReverse = !sortReverse">
							Last Hand shake Time  <span
							ng-show="sortType == 'hs_time_stamp' && !sortReverse"
							class="fa fa-caret-down"></span> <span
							ng-show="sortType == 'hs_time_stamp' && sortReverse"
							class="fa fa-caret-up"></span>
					</a></td>
					<td align="center"><a>ACTION</a></td>

				</tr>
			</thead>

			<tbody>
				<tr
					ng-repeat="obj in list | orderBy:sortType:sortReverse | filter:searchFish">
					<td align="center">{{ $index + 1 }}</td>
					<td align="center">{{ obj.name }}</td>
					
					<td align="center">{{ obj.gateway_serial_number}}</td>
<td align="center">{{ obj.hs_time_stamp |  date : "medium" }}</td>


					<td align="center"><md-icon class="material-icons"
							ng-click="update_dcu(obj);" data-toggle="tooltip"
							title="Update DCU Details"
							style="color:#607D8B;font-size: 20px; height: 20px">edit</md-icon>

						<md-icon class="material-icons" ng-click="deleteconf(obj.gateway_serial_number);"
							data-toggle="tooltip" title="Delete DCU "
							style="color:#F44336;font-size: 20px; height: 20px">delete</md-icon>

						<md-icon class="material-icons"
							ng-click="modifydcu(obj.gateway_serial_number);"
							data-toggle="tooltip" title="Modify DCU Configuation"
							style="color:#004d00;font-size: 20px; height: 20px">settings</md-icon>

						<md-icon class="material-icons" ng-click="syncnodeconfig(obj.gateway_serial_number);"
							data-toggle="tooltip" title="Sync Node Config"
							style="color:#607D8B;font-size: 20px; height: 20px">group_work</md-icon>

						<md-icon class="material-icons" ng-click="syncsheduleconfig(obj.gateway_serial_number);"
							data-toggle="tooltip" title="Sync Shedule Config "
							style="color:#7CB342;font-size: 20px; height: 20px">date_range</md-icon>

						<md-icon class="material-icons"
							ng-click="meterlist(obj.gateway_serial_number);"
							data-toggle="tooltip" title="Meter List"
							style="color:#004d00;font-size: 20px; height: 20px">view_headline</md-icon>
							
							
							<md-icon class="material-icons"
							ng-click="sync_config(obj.gateway_serial_number);"
							data-toggle="tooltip" title="Syn Conf Details"
							style="color:#004d00;font-size: 20px; height: 20px">autorenew</md-icon>
							
					</td>
				</tr>
			</tbody>
		</table>
	</div>
	<div class="col-md-12" align="center">
		<pagination boundary-links="true" max-size="3"
			items-per-page="itemsPerPage" total-items="todos.length"
			ng-model="currentPage" ng-change="pageChanged()"></pagination>
	</div>
	</div>
</section>
