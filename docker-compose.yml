# CCMS production stack.
#
# CCMS production stack — fully self-contained for YAML-only paste.
#
# All seed data is baked into the ccms-seed image. All persistent
# data uses named Docker volumes (no host bind mounts required).
#
# Custom images are built by .github/workflows/build-images.yml on
# every push to main and published to GitHub Container Registry:
#   - ghcr.io/crossfields-synergy-pvt-ltd/ccms-server
#   - ghcr.io/crossfields-synergy-pvt-ltd/ccms-ui
#   - ghcr.io/crossfields-synergy-pvt-ltd/ccms-seed
#
# HOSTINGER VPS DEPLOYMENT:
#   Paste this entire file into Hostinger's YAML editor.
#   Set environment variables in Hostinger's Environment section.
#   No .env file is needed.
#
# LOCAL DEVELOPMENT:
#   Copy .env.example to .env in the project root. Docker Compose
#   reads it automatically for ${VARIABLE} substitution.

services:
  mongodb:
    image: mongo:3.4
    container_name: cspl-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  mysql:
    image: mysql:5.7
    container_name: cspl-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-employee_db}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  seed:
    image: ghcr.io/crossfields-synergy-pvt-ltd/ccms-seed:latest
    container_name: cspl-seed
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      MONGO_HOST: ${MONGODB_HOST:-mongodb}
      MONGO_PORT: ${MONGODB_PORT:-27017}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-employee_db}
      SEED_DATA: ${SEED_DATA:-true}
      USERS_JSON: ${USERS_JSON:-[]}
    restart: "no"

  server:
    image: ghcr.io/crossfields-synergy-pvt-ltd/ccms-server:latest
    container_name: cspl-server
    ports:
      - "${SERVER_PORT:-8102}:${SERVER_PORT:-8102}"
      - "${NETTY_PORT:-9100}:${NETTY_PORT:-9100}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8102}
      SERVER_CONTEXT_PATH: ${SERVER_CONTEXT_PATH:-/user}
      NETTY_PORT: ${NETTY_PORT:-9100}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE:-ccms}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME:-}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD:-}
      SERVER_LOG_DIR: ${SERVER_LOG_DIR:-/home/CCMS/roadmap/logs}
    depends_on:
      mongodb:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${SERVER_PORT:-8102}/user/push/hafe_open_connections"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ccms_ui:
    image: ghcr.io/crossfields-synergy-pvt-ltd/ccms-ui:latest
    container_name: cspl-ccms-ui
    ports: []
    volumes:
      - historical_data:/home/data/dontdelete
    environment:
      CCMS_SERVER_HOST: ${CCMS_SERVER_HOST:-server}
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-ccms}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-employee_db}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SERVER_PORT: ${SERVER_PORT:-8102}
      BACKEND_HTTP_PORT: ${BACKEND_HTTP_PORT:-8102}
      BACKEND_HTTP_CONTEXT: ${BACKEND_HTTP_CONTEXT:-/user}
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
      server:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  mongodb_data:
  mysql_data:
  historical_data:
